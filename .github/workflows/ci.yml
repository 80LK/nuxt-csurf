name: ci

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install
      - run: yarn dev:prepare
      - run: yarn lint
      - run: yarn build

      - name: Prepare dist branch
        run: |
          mkdir dist-branch
          cp -r dist dist-branch/
          cp package.json dist-branch/
          cp README.md dist-branch/
          cp LICENSE dist-branch/

      - name: Push to dist branch
        run: |
          cd dist-branch
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "build: update dist"
          git branch -M dist
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push -f origin dist
